schema_version: 1
id: no-per-file-inventory-in-docs
title: No per-file inventory tables in docs
description: >-
  Do not list every file and its purpose in documentation. These tables go
  stale as soon as files are added or renamed. Instead, describe the structural
  principle, such as "flat src/ for modules, src/cli/ for entrypoints, and
  src/__tests__/ for tests."
type: generic
domain: coding_workflow
applies_to:
  - implement
  - fix-pr
  - review
severity: should
weight: 6
status: active
examples:
  - note: >-
      Per-file module and CLI tables were removed from ai-workflows.md and
      replaced with a one-line structural description.
