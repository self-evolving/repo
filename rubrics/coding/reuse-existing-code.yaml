schema_version: 1
id: reuse-existing-code
title: Reuse existing code
description: >-
  Inspect the repository first and reuse existing helpers, patterns, and
  libraries before adding new implementations for behavior the project already
  supports. Avoid embedding nontrivial implementation logic directly in
  workflow or action glue when the repository has reusable typed modules that
  should own that behavior.
type: generic
domain: coding_workflow
applies_to:
  - implement
  - fix-pr
  - review
severity: should
weight: 8
status: active
examples:
  - note: The requested rubrics seed says to "check the code and avoid rebuild the wheels."
  - note: >-
      User asked agents to check reusable `.agent/src` library code and avoid
      long inline bash or Node commands inside GitHub Actions.
