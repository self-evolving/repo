schema_version: 1
id: surgical-changes
title: Make surgical changes
description: >-
  Touch only the code needed for the user request. Do not refactor,
  reformat, rename, or clean up adjacent code unless it is required by the
  task. Match the existing local style, remove only unused code introduced by
  your own change, and mention unrelated dead code instead of deleting it.
type: generic
domain: coding_workflow
applies_to:
  - implement
  - fix-pr
  - review
  - rubrics-review
severity: must
weight: 8
status: active
examples:
  - source: https://github.com/forrestchang/andrej-karpathy-skills
  - note: >-
      User requested a rubric modeled on the Surgical Changes principle:
      touch only what is necessary and clean up only changes introduced by the
      task.
