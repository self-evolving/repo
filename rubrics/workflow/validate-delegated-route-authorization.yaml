schema_version: 1
id: validate-delegated-route-authorization
title: Validate delegated route authorization
description: >-
  When a user-authorized route delegates to another route, workflow, or agent
  action, preserve the original requester authorization context and validate
  each downstream action against its own access policy, or enforce an explicit
  invariant that the entry route is no broader than every delegated route.
type: generic
domain: coding_workflow
applies_to:
  - implement
  - fix-pr
  - review
severity: must
weight: 8
status: active
examples:
  - source: https://github.com/self-evolving/repo/pull/20#discussion_r3160685570
    note: >-
      The requester agreed the delegated authorization gap was real and
      emphasized that the orchestrate entry route must have at least the same
      access constraints as the downstream routes it can launch.
