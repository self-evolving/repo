schema_version: 1
id: prefer-explicit-structured-inputs
title: Prefer explicit structured inputs
description: >-
  When adding workflow, CLI, planner, or agent-facing inputs, prefer separate
  typed fields with clear validation over encoding multiple meanings or commands
  into one string value. Fail clearly on ambiguous combinations instead of
  relying on implicit precedence.
type: generic
domain: coding_workflow
applies_to:
  - implement
  - fix-pr
  - review
severity: should
weight: 7
status: active
examples:
  - source: https://github.com/self-evolving/repo/issues/30#issuecomment-4349739867
    note: >-
      The accepted design kept `base_branch` and `base_pr` as separate validated
      inputs rather than overloading one field with a mini-language.
