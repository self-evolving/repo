schema_version: 1
id: default-merge-strategy
title: Use default merge flow
description: >-
  Do not use squash merges unless explicitly requested. Use the repository's
  default merge flow, and ask before merging when the expected strategy is
  ambiguous.
type: generic
domain: coding_workflow
applies_to:
  - implement
  - fix-pr
severity: must
weight: 7
status: active
examples:
  - note: The requested rubrics seed explicitly asks for a merge preference rubric against squash merges unless requested.
