schema_version: 1
id: surface-stateful-failures
title: Surface stateful failures
description: >-
  When runtime, workflow, or persistence code fails to capture data needed for
  future retries or continuity, do not silently swallow the failure or persist a
  misleading clean success state. Surface the error in logs or status, and add
  focused regression coverage for the failure mode.
type: generic
domain: coding_workflow
applies_to:
  - implement
  - fix-pr
  - review
severity: should
weight: 7
status: active
examples:
  - note: >-
      A swallowed session identity read failure let a successful run persist
      unusable continuity state; the requested fix was to make extraction
      failures reliable, observable, and covered by regression tests.
