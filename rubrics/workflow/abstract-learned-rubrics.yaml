schema_version: 1
id: abstract-learned-rubrics
title: Abstract learned rubrics from examples
description: >-
  When adding or updating rubrics from issue, PR, discussion, or review
  feedback, encode the stable reusable preference rather than the specific
  project artifact, feature, file, workflow, or one-off implementation. Keep
  concrete references as provenance examples. If the lesson only applies to one
  subsystem or historical design choice, prefer project memory or documentation
  instead of an active rubric.
type: generic
domain: coding_workflow
applies_to:
  - rubrics-initialization
  - rubrics-update
  - rubrics-review
severity: should
weight: 8
status: active
examples:
  - note: >-
      Maintainer asked to turn the PolySkill-style rubric discussion into a
      rubric for adding rubrics: learn the reusable abstraction, not the local
      implementation detail.
