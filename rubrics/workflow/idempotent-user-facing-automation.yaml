schema_version: 1
id: idempotent-user-facing-automation
title: Make user-facing automation idempotent
description: >-
  When automation creates user-visible setup, status, or guidance artifacts that
  may be rerun, make reruns update or reuse the existing artifact through a
  stable marker or lookup before creating new issues, comments, or labels. Keep
  the behavior non-destructive and document important edge cases.
type: generic
domain: coding_workflow
applies_to:
  - implement
  - fix-pr
  - review
severity: should
weight: 7
status: active
examples:
  - source: https://github.com/self-evolving/repo/issues/23#issuecomment-4346402675
    note: >-
      The requester framed onboarding as a first setup issue with configuration
      status, next steps, and copyable commands rather than repeated ad hoc
      output.
  - source: https://github.com/self-evolving/repo/pull/62#issuecomment-4367354192
    note: >-
      Before merging the onboarding PR, the requester asked what happens when
      the setup workflow runs again with an existing onboarding issue.
