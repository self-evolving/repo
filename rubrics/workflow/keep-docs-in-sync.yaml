schema_version: 1
id: keep-docs-in-sync
title: Keep docs in sync
description: >-
  When updating or fine-tuning agent functions, workflows, runtime behavior, or
  other user-facing behavior, update the relevant documentation in the same
  change so the docs continue to reflect how the system works.
type: generic
domain: coding_workflow
applies_to:
  - implement
  - fix-pr
  - review
severity: should
weight: 7
status: active
examples:
  - note: >-
      Maintainer explicitly asked to add a rubric: when updating or fine-tuning
      functions, update the docs to reflect the behavior.
