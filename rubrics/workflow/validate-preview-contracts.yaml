schema_version: 1
id: validate-preview-contracts
title: Validate preview contracts
description: >-
  When implementing dry-run, preview, or read-only modes for automation, validate
  the same structured inputs and output contracts that real mutation paths
  require. Do not let missing or malformed plans, summaries, or command output
  become a misleading clean no-op; fail clearly or surface an explicit warning
  with focused regression coverage.
type: generic
domain: coding_workflow
applies_to:
  - implement
  - fix-pr
  - review
severity: should
weight: 7
status: active
examples:
  - source: https://github.com/self-evolving/repo/pull/39#issuecomment-4348043093
    note: >-
      Maintainer asked to fix a dry-run path that accepted missing or malformed
      structured label plans and reported zero planned operations instead of
      surfacing the invalid agent response.
