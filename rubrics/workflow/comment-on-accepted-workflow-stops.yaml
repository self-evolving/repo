schema_version: 1
id: comment-on-accepted-workflow-stops
title: Comment on accepted workflow stops
description: >-
  When an explicit user request is accepted but the workflow later decides to
  stop because of target state, policy, budget, or another expected guardrail,
  post a concise thread-visible status with the stop reason so the request does
  not look like a silent no-op.
type: generic
domain: coding_workflow
applies_to:
  - implement
  - fix-pr
  - review
severity: should
weight: 6
status: active
examples:
  - source: https://github.com/self-evolving/repo/pull/20#discussion_r3160658044
    note: >-
      The requester endorsed adding a visible follow-up comment for accepted
      orchestrator requests that stop due to closed PRs, budget exhaustion, or
      delegated authorization denial.
