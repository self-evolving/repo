schema_version: 1
id: orchestrator-one-shot-followup-default
title: Default follow-up orchestration to one-shot
description: >-
  In agent automation mode, do not continue automation on second or later
  user-launched follow-up rounds unless explicitly requested. The first
  automatic handoff after an original request is acceptable, but later
  user-triggered review, fix-pr, or implement runs should default to stop unless
  the user asks for automation, a full pipeline, auto-fix, or continued handoff.
type: specific
domain: coding_workflow
applies_to:
  - implement
  - fix-pr
  - review
severity: should
weight: 8
status: active
examples:
  - note: >-
      The requested orchestrator rubric says agent-mode planning should treat
      follow-up user-launched rounds as one-shot by default, while heuristics
      mode remains deterministic and will not honor this advisory preference.
