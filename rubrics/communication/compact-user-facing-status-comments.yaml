schema_version: 1
id: compact-user-facing-status-comments
title: Keep status comments compact
description: >-
  When creating or changing agent automation status comments, make the visible
  text user-facing and scannable instead of raw log-like output. Prefer compact
  structured formatting for short stable fields, and keep verbose details
  outside dense tables so comments remain easy to read.
type: generic
domain: communication
applies_to:
  - implement
  - fix-pr
  - review
severity: should
weight: 6
status: active
examples:
  - source: https://github.com/self-evolving/repo/issues/90#issuecomment-4364729927
    note: >-
      Maintainer asked whether the agent could use a simple tabular format for
      status comments that felt too dry and log-like.
  - source: https://github.com/self-evolving/repo/issues/90#issuecomment-4365154496
    note: >-
      Maintainer asked to transpose the status table so it used fewer rows and
      took less vertical space.
