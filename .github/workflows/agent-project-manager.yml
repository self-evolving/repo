name: Agent / Project Manager

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      enabled:
        description: "Set true to run project management. Defaults off."
        required: false
        default: "false"
      dry_run:
        description: "Set false to allow label writes."
        required: false
        default: "true"
      apply_labels:
        description: "Set true to update priority/urgency labels."
        required: false
        default: "false"
      post_summary:
        description: "Set true to post the summary to an issue."
        required: false
        default: "false"
      summary_issue_number:
        description: "Issue number for summary comments when post_summary is true."
        required: false
        default: ""
      limit:
        description: "Maximum open issues and PRs to score per kind."
        required: false
        default: "100"

permissions:
  contents: read
  issues: write
  pull-requests: write
  id-token: write # required for GitHub Actions OIDC broker exchange

concurrency:
  group: agent-project-manager-${{ github.repository }}
  cancel-in-progress: false

jobs:
  gate:
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.enabled == 'true') || (github.event_name != 'workflow_dispatch' && vars.AGENT_PROJECT_MANAGEMENT_ENABLED == 'true') }}
    runs-on: ${{ fromJson(vars.AGENT_RUNS_ON || '["ubuntu-latest"]') }}
    outputs:
      skip: ${{ steps.gate.outputs.skip }}
      mode: ${{ steps.gate.outputs.mode }}
      reason: ${{ steps.gate.outputs.reason }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ github.token }}

      - name: Resolve scheduled activity gate
        id: gate
        uses: ./.github/actions/scheduled-activity-gate
        with:
          github_token: ${{ github.token }}
          schedule_policy: ${{ vars.AGENT_SCHEDULE_POLICY || '' }}
          workflow: agent-project-manager.yml

  project-management:
    needs: gate
    if: needs.gate.outputs.skip != 'true'
    runs-on: ${{ fromJson(vars.AGENT_RUNS_ON || '["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ github.token }}

      - name: Resolve GitHub auth
        id: auth
        uses: ./.github/actions/resolve-github-auth
        with:
          app_id: ${{ secrets.AGENT_APP_ID }}
          app_private_key: ${{ secrets.AGENT_APP_PRIVATE_KEY }}
          pat: ${{ secrets.AGENT_PAT }}
          fallback_token: ${{ github.token }}

      - name: Setup agent runtime
        uses: ./.github/actions/setup-agent-runtime

      - name: Score project items
        env:
          AGENT_PROJECT_MANAGEMENT_ENABLED: ${{ github.event_name == 'workflow_dispatch' && inputs.enabled || vars.AGENT_PROJECT_MANAGEMENT_ENABLED || 'false' }}
          AGENT_PROJECT_MANAGEMENT_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || vars.AGENT_PROJECT_MANAGEMENT_DRY_RUN || 'true' }}
          AGENT_PROJECT_MANAGEMENT_APPLY_LABELS: ${{ github.event_name == 'workflow_dispatch' && inputs.apply_labels || vars.AGENT_PROJECT_MANAGEMENT_APPLY_LABELS || 'false' }}
          AGENT_PROJECT_MANAGEMENT_POST_SUMMARY: ${{ github.event_name == 'workflow_dispatch' && inputs.post_summary || vars.AGENT_PROJECT_MANAGEMENT_POST_SUMMARY || 'false' }}
          AGENT_PROJECT_MANAGEMENT_SUMMARY_ISSUE: ${{ github.event_name == 'workflow_dispatch' && inputs.summary_issue_number || vars.AGENT_PROJECT_MANAGEMENT_SUMMARY_ISSUE || '' }}
          AGENT_PROJECT_MANAGEMENT_LIMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.limit || vars.AGENT_PROJECT_MANAGEMENT_LIMIT || '100' }}
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          GITHUB_TOKEN: ${{ steps.auth.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node .agent/dist/cli/agent-project-manager.js
