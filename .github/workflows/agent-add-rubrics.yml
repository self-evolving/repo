name: Agent / Rubrics / Add

on:
  workflow_call:
    inputs:
      target_number:
        description: "Target issue, PR, or discussion number"
        required: true
        type: string
      target_url:
        description: "Target URL"
        required: true
        type: string
      target_kind:
        description: "Target kind (issue, pull_request, discussion)"
        required: true
        type: string
      source_kind:
        description: "Trigger source kind"
        required: false
        default: workflow_dispatch
        type: string
      response_kind:
        description: "Response surface kind"
        required: false
        default: issue_comment
        type: string
      review_comment_id:
        description: "Review comment id for reply surfaces"
        required: false
        default: ""
        type: string
      discussion_id:
        description: "Discussion node id for discussion replies"
        required: false
        default: ""
        type: string
      reply_to_id:
        description: "Optional reply-to id for threaded comments"
        required: false
        default: ""
        type: string
      request_text:
        description: "Original user request text"
        required: false
        default: ""
        type: string
      requested_by:
        description: "GitHub login that requested the run"
        required: false
        default: ""
        type: string
      rubrics_ref:
        description: "Rubrics branch to update"
        required: false
        default: agent/rubrics
        type: string
      runs_on:
        description: "Runner labels as JSON array"
        required: false
        default: ""
        type: string
      session_bundle_mode:
        description: "Session bundle mode (auto, always, never)"
        required: false
        default: ""
        type: string
  workflow_dispatch:
    inputs:
      target_number:
        description: "Target issue, PR, or discussion number"
        required: true
      target_url:
        description: "Target URL"
        required: true
      target_kind:
        description: "Target kind (issue, pull_request, discussion)"
        required: true
      source_kind:
        description: "Trigger source kind"
        required: false
        default: workflow_dispatch
      response_kind:
        description: "Response surface kind"
        required: false
        default: issue_comment
      request_text:
        description: "Original user request text"
        required: false
        default: ""
      requested_by:
        description: "GitHub login that requested the run"
        required: false
        default: ""
      rubrics_ref:
        description: "Rubrics branch to update"
        required: false
        default: agent/rubrics

permissions:
  contents: write
  discussions: write
  issues: write
  pull-requests: write
  id-token: write # required for GitHub Actions OIDC broker exchange

jobs:
  add-rubrics:
    runs-on: ${{ fromJson(inputs.runs_on || vars.AGENT_RUNS_ON || '["ubuntu-latest"]') }}
    env:
      TARGET_NUMBER: ${{ inputs.target_number }}
      TARGET_URL: ${{ inputs.target_url }}
      TARGET_KIND: ${{ inputs.target_kind }}
      SOURCE_KIND: ${{ inputs.source_kind }}
      RESPONSE_KIND: ${{ inputs.response_kind }}
      REQUEST_TEXT: ${{ inputs.request_text }}
      REQUESTED_BY: ${{ inputs.requested_by }}
      RUBRICS_REF: ${{ inputs.rubrics_ref || vars.AGENT_RUBRICS_REF || 'agent/rubrics' }}
      REVIEW_COMMENT_ID: ${{ inputs.review_comment_id }}
      DISCUSSION_ID: ${{ inputs.discussion_id }}
      REPLY_TO_ID: ${{ inputs.reply_to_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ github.token }}

      - name: Resolve GitHub auth
        id: auth
        uses: ./.github/actions/resolve-github-auth
        with:
          app_id: ${{ secrets.AGENT_APP_ID }}
          app_private_key: ${{ secrets.AGENT_APP_PRIVATE_KEY }}
          pat: ${{ secrets.AGENT_PAT }}
          fallback_token: ${{ github.token }}

      - name: Resolve add-rubrics provider
        id: provider
        uses: ./.github/actions/resolve-agent-provider
        with:
          route: add-rubrics
          default_provider: ${{ vars.AGENT_DEFAULT_PROVIDER || 'auto' }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          claude_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Setup agent runtime
        uses: ./.github/actions/setup-agent-runtime
        with:
          install_codex: ${{ steps.provider.outputs.install_codex }}
          install_claude: ${{ steps.provider.outputs.install_claude }}

      - name: Add or update rubrics from request
        id: add_rubrics
        uses: ./.github/actions/run-agent-task
        with:
          agent: ${{ steps.provider.outputs.provider }}
          github_token: ${{ steps.auth.outputs.token }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          claude_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          permission_mode: approve-all
          prompt: add-rubrics
          route: add-rubrics
          lane: add-rubrics
          memory_mode_override: 'read-only'
          memory_ref: ${{ vars.AGENT_MEMORY_REF || 'agent/memory' }}
          memory_policy: ${{ vars.AGENT_MEMORY_POLICY || '' }}
          rubrics_mode_override: 'enabled'
          rubrics_ref: ${{ env.RUBRICS_REF }}
          rubrics_policy: ${{ vars.AGENT_RUBRICS_POLICY || '' }}
          rubrics_limit: ${{ vars.AGENT_RUBRICS_LIMIT || '10' }}
          session_bundle_mode: ${{ inputs.session_bundle_mode || vars.AGENT_SESSION_BUNDLE_MODE || 'auto' }}
          session_policy: none
          request_text: ${{ env.REQUEST_TEXT }}
          requested_by: ${{ env.REQUESTED_BY || github.actor }}
          source_kind: ${{ env.SOURCE_KIND }}
          target_kind: ${{ env.TARGET_KIND }}
          target_number: ${{ env.TARGET_NUMBER }}
          target_url: ${{ env.TARGET_URL }}
          reasoning_effort: medium
          workflow: agent-add-rubrics.yml

      - name: Prepare add-rubrics summary
        if: always()
        id: add_rubrics_summary
        env:
          RESPONSE_FILE: ${{ steps.add_rubrics.outputs.response_file }}
          RUBRICS_COMMITTED: ${{ steps.add_rubrics.outputs.rubrics_committed }}
          RUBRICS_STEP_OUTCOME: ${{ steps.add_rubrics.outcome }}
          RUBRICS_REF: ${{ env.RUBRICS_REF }}
        run: node .agent/dist/cli/prepare-add-rubrics-summary.js

      - name: Post add-rubrics summary
        if: always() && steps.add_rubrics_summary.outputs.body_file != ''
        env:
          BODY_FILE: ${{ steps.add_rubrics_summary.outputs.body_file }}
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RESPONSE_KIND: ${{ env.RESPONSE_KIND }}
          TARGET_NUMBER: ${{ env.TARGET_NUMBER }}
          REVIEW_COMMENT_ID: ${{ env.REVIEW_COMMENT_ID }}
          DISCUSSION_ID: ${{ env.DISCUSSION_ID }}
          REPLY_TO_ID: ${{ env.REPLY_TO_ID }}
        run: node .agent/dist/cli/post-response.js
